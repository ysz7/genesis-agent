# Run the agent as a service. Copy .env.example -> .env first.
#   docker compose up --build
services:
  agent:
    build: .
    env_file:
      # Holds PROVIDER/MODEL/API_KEY and, optionally, SERVER_TOKEN for bearer auth.
      - .env
    # The image's CMD already binds 0.0.0.0 so the published port is reachable.
    ports:
      - "8181:8181"
    volumes:
      # Persist the agent sandbox + state store across restarts.
      - ./workspace:/app/workspace
    restart: unless-stopped
