# One Postgres with pgvector — relational tables AND vector search in a single
# service/process. Start it with:  docker compose up -d
# schema.sql is applied automatically on the first run (empty data volume).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
