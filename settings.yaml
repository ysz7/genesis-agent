# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  genesis-agent — settings.yaml (non-secret config)                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# A fresh copy runs with EVERYTHING here left as-is — open this file only when
# you want to tune something. Secrets (provider, model, API key) go in .env.
# Each key below says: what it does · its default · good values for your setup.
# Loaded into deps.settings; tools read it via ctx.deps.settings["..."].

# ── Identity ──────────────────────────────────────────────────────────────────
# Who this agent is and where it keeps state.

# Display name. Default: the folder name.
name: genesis-agent

# State-store file inside workspace/ for cross-run memory (get/set/append/all).
# Default: state.json. Use *.json (human-readable, diffable) or *.sqlite (SQLite,
# better for large/concurrent state). REQUIRED for gateways: set agent.sqlite
# (the CLI and a bot share this store, and only SQLite/WAL is concurrency-safe).
store: agent.sqlite

# Sandbox + state directory, relative to this folder. Default: workspace.
# Rarely changed — handy to point several agents at one shared area, or onto a
# mounted volume.
# workspace: workspace

# Render the agent's final answer as Markdown in the console (so **bold**, lists,
# and `code` show as formatting, not raw syntax). Default: true. Set false for
# verbatim raw text — e.g. when piping the answer into another tool.
render_markdown: true

# ── Memory & context ───────────────────────────────────────────────────────────
# How much conversation and tool output the model carries. The defaults suit
# large cloud contexts; shrink them for small local models (see "Running on
# local models" in the README).

# REPL turns kept between prompts (older messages dropped). Default: 40.
#   cloud models            : 40
#   small local contexts    : 10-15
# One-shot runs and the HTTP server are stateless by default; /clear forgets it.
history_keep: 40

# Persistent conversation threads (optional). OFF by default: the REPL forgets a
# conversation on exit. Turn this on and a conversation can be saved/resumed by
# id, surviving a restart — it's stored in the same `store` under `thread:<id>`.
#   REPL  : `agent --session work` resumes thread "work"; in-REPL use
#           /threads, /resume <id>, /new (a fresh, unnamed conversation).
#   server: POST {"task": ..., "session": "<id>"} loads + saves that thread;
#           without a session the server stays stateless.
# Capped to history_keep messages so a thread stays lean on disk.
threads:
  enabled: true

# Your model's usable context window, in tokens — auto-compaction triggers at
# ~60% of this (older history is summarized, not truncated, so early facts
# survive). Default: 100000.
#   GPT-4o / Claude / most cloud   : 100000
#   qwen3 via Ollama (32k)         : 24000
#   llama3.3 at default num_ctx    : 6000
context_budget: 100000

# Auto-compaction behaviour. enabled: true by default (set false to fall back to
# plain history_keep truncation). keep = recent messages left verbatim;
# max_tokens caps the summary itself.
#   chatty/long sessions    : keep 12 (default)
#   tight local context     : keep 6, max_tokens 512
compaction:
  enabled: true
  keep: 12
  # max_tokens: 1024

# Context editing (Phase 30). A cheaper first pass that runs BEFORE compaction,
# off the same ~60%-of-context_budget line: it replaces the BODY of large, stale
# tool results (run_shell / fetch_url output) with a short
# `[tool output cleared: <tool>, <n> chars]` marker, keeping the call and its
# reasoning. Often reclaims enough budget on tool-heavy runs to skip a full
# summary entirely — and it's less lossy (the model still sees what ran). The
# full output stays in the saved thread; only the model's view for that request
# shrinks. ON by default; set enabled: false to rely on compaction alone.
#   keep_last : recent messages left untouched (their tool output survives). 6.
#   min_chars : only bodies larger than this are cleared. Default 2000 (~500 tok).
context_editing:
  enabled: true
  keep_last: 6
  min_chars: 2000

# Cap on a SINGLE tool's output, in characters (run_shell, fetch_url, HTML
# cleaner). Default: 20000 (~5k tokens). One big result can swamp a small local
# context, so lower it there.
#   cloud (GPT/Claude)             : 20000
#   local 32k ctx (qwen3)          : 8000
#   local 8k ctx (llama3.3)        : 3000
max_tool_output: 20000

# ── Guardrails ─────────────────────────────────────────────────────────────────
# Keep a run bounded and reliable.

# Per-run ceilings (pydantic_ai.usage.UsageLimits). request_limit caps model
# requests per task — the cheapest insurance against a runaway tool loop. A hit
# ends the run with a clean message, not a stack trace. Default: request_limit 25.
#   simple Q&A verticals    : 10
#   default                 : 25
#   long research tasks     : 50+
# Add total_tokens_limit to cap spend per run.
limits:
  request_limit: 25
  # total_tokens_limit: 200000

# Retries on a failed tool/model call (Pydantic AI). Default: 2.
#   cloud APIs              : 2
#   flaky local setups      : 3-4
#   debugging tool errors   : 0  (see the real failure immediately)
retries: 2

# ── Model ────────────────────────────────────────────────────────────────────
# Knobs passed straight to the model (pydantic_ai ModelSettings) — anything it
# accepts works, so new keys need no template change. Unset = provider defaults.
#   tool-driven / deterministic verticals : temperature 0
#   creative writing verticals            : temperature 0.7+
# max_tokens caps the model's reply length; timeout is per request (seconds).
model_settings:
  temperature: 0
  # max_tokens: 2048
  timeout: 60

# Model fallback (optional). A list of backup model ids on the SAME provider/key:
# if the primary model fails for a transient reason (HTTP error, rate-limit,
# outage), the run transparently retries the next one. For availability, not bad
# output. Unset = no fallback (single model, as before). Shown in the banner.
#   openai   : model_fallbacks: [gpt-4.1]
#   anthropic: model_fallbacks: [claude-sonnet-5]
# model_fallbacks: []

# Extended thinking / reasoning budget (optional). The single biggest quality
# lever on hard tasks: let the model reason before answering. OFF by default
# (costs extra tokens; not every model supports it). Thinking shows as a dim
# THINK line in the console and an SSE `thinking` event on --serve, kept separate
# from the answer.
#   enabled      : turn it on. Default off.
#   effort       : portable level — minimal | low | medium | high | xhigh. Works
#                  on any reasoning-capable model (reasoning_effort is an alias).
#   budget_tokens: Anthropic only — an exact thinking-token budget (overrides
#                  effort for Anthropic). Needs a big enough model max_tokens.
# Applies to anthropic + openai; openrouter/ollama/custom endpoints no-op with a
# hint (set model_settings.thinking by hand if your model supports it). On
# Anthropic, temperature/top_p above are auto-dropped (thinking requires them
# unset). Reasoning-only models (o-series, etc.) may always think regardless.
# thinking:
#   enabled: true
#   effort: high
#   # budget_tokens: 4000   # Anthropic: precise control instead of effort

# ── Sandbox & tools ─────────────────────────────────────────────────────────────
# Control what the agent can touch.

# Confine read_file/write_file/list_dir to workspace/ (../ escapes and absolute
# paths outside are refused). Default: true. Set false ONLY for trusted setups.
# Does NOT constrain run_shell — gate that with `tools:` below.
# sandbox: true

# Tool policy. disable: tools never registered (the model can't see them).
# confirm: tools that need a human approval (once / always / deny) before each
# call. Why the default below matters: fetch_url / web_search content is
# attacker-controlled (prompt injection), so an unconfirmed run_shell is an
# injection-to-RCE chain — shell commands are confirmed by DEFAULT. Answer
# "always" once to stop being asked. Headless --serve has no human: either
# grant "always" first and set approvals.headless_allow_granted, or (trusted
# setups only) remove run_shell from this list.
#   untrusted inputs / web content : keep the default (or disable run_shell)
#   fully trusted local use        : tools: {confirm: []}
tools:
  confirm: [run_shell]

# Secret redaction (ON by default). Values from .env (API keys, tokens) are
# replaced with [secret:NAME] in every tool output and in the final answer, so
# `cat .env` — typed or prompt-injected — can't leak credentials to the model,
# logs, or chat. Set false only for trusted setups that need raw values.
# redact_secrets: true

# Guardrails (optional). A content layer ON TOP of the tool policy: regex checks
# on the run's text input and the model's output. OFF by default (zero overhead).
# input.block  : a matching task is refused, never sent to the model.
# input.redact : matching spans are replaced with [redacted] before sending.
# output.block : a matching answer triggers a retry (up to `retries`), then a
#                clean failure.
# output.redact: matching spans are replaced with [redacted] in the answer.
# This is the *seam*, not a policy library — a vertical adds its own patterns
# (or a custom @agent.output_validator in factory.py). Injection defence still
# rests on the tool policy above; this guards the content, not the tool calls.
# guardrails:
#   input:
#     block:  ["(?i)\\bssn\\b"]
#     redact: ["\\b\\d{16}\\b"]
#   output:
#     redact: ["\\b\\d{16}\\b"]

# ── Server (--serve) ───────────────────────────────────────────────────────────
# Per-task wall-clock ceiling, seconds — a longer task is cancelled with 504.
# Default: 300. Guards against a hung model call holding a worker thread.
#   interactive/short tasks : 120
#   default                 : 300
#   long research endpoints : 600+
# serve_timeout: 300

# ── Observability (optional) ──────────────────────────────────────────────────────
# Append one JSON line per finished run (CLI / server / gateway) to
# workspace/runs.jsonl — task, model, token usage, tool calls, duration. Cheap,
# and the simplest way to see real token spend over time. Default: false.
log_runs: true

# ── Prompt caching (optional) ─────────────────────────────────────────────────────
# Reuse the provider's prompt cache for the static prefix to cut cost/latency on
# repeated runs. Anthropic: caches the (static) tool definitions — the footer
# shows "N cached" when a run reads from cache. OpenAI caches automatically;
# other providers: no-op. Instructions aren't cached (the dynamic datetime prompt
# would prevent hits). Cache TTL is a few minutes, so it helps bursts/loops.
prompt_caching: true

# ── Multimodal input (optional) ──────────────────────────────────────────────────
# Attach images/PDFs to a run: one-shot `--image PATH_OR_URL`, drag a file into
# the REPL, or POST `{"task": ..., "images": ["https://..."]}` (server = URLs
# only). Needs a vision-capable model; non-vision models degrade with a clear
# message. max_mb caps a single attachment's size (default 10).
# attachments:
#   max_mb: 10

# ── Planning (optional) ─────────────────────────────────────────────────────────
# Gives the agent `update_plan` — a short todo checklist it keeps up to date on
# multi-step tasks. The current plan is shown to the model each turn and rendered
# in the console. It's a scratchpad, not enforced control flow. ON by default
# (cheap, recommended for agentic multi-step verticals); set enabled: false for
# simple one-shot Q&A.
planning:
  enabled: true

# ── Verify / self-critique (optional) ───────────────────────────────────────────
# Before finalizing, a strict evaluator (a separate, fresh-context model call —
# NOT the agent grading its own work in-context) judges the answer against the
# task and, if it falls short, the run is repeated once with the evaluator's
# feedback ("fix the weakest point first"). The single most reliable quality lift
# on research/codegen tasks. OFF by default (costs one extra call). Trivial
# one-shot answers (short, no tool calls) are skipped so small tasks stay small.
#   max_rounds : revisions allowed after the first answer (0 disables). Default 1.
#   model      : optional cheaper evaluator id (same provider/key) — a small model
#                is usually enough to spot gaps. Unset = the agent's own model.
#   min_output_chars : answers shorter than this (with no tool calls) skip
#                      verification. Default 400.
# verify:
#   enabled: true
#   max_rounds: 1
#   # model: gpt-4.1-mini
#   # min_output_chars: 400

# ── Scheduling (recurring tasks, optional) ───────────────────────────────────────
# Lets the agent schedule recurring tasks from a chat — `schedule_task`,
# `list_scheduled`, `cancel_scheduled`, `edit_scheduled` (e.g. "summarize HN every
# 2 hours"). Jobs persist in the store (shared with the menu's Scheduler) and fire
# in the BACKGROUND while a long-lived process is up — a gateway bot or the HTTP
# server (`--serve`). Each result is delivered to ALL channels (every Telegram /
# WhatsApp allowlisted user, the CLI feed if open, the server log). ON by default.
#   enabled  : register the tools + run the background ticker. Default true.
#   tick     : server check interval, seconds (how often it looks for due jobs).
#   max_jobs : cap on stored jobs (guards token spend). 0 / unset = unlimited.
# One process runs each due job (a shared owner-lock prevents double-firing);
# delivery still fans out to every channel. Jobs only fire while a bot/server is
# up — for 24/7 without one, use external cron (scripts/run.*).
scheduler:
  enabled: true
  tick: 30
  max_jobs: 50

# ── Subagents / delegation (optional) ────────────────────────────────────────────
# Gives the agent `delegate(task)` — run a fresh sub-agent on an isolated subtask
# (clean context) and get back just its answer. Good for focused lookups or
# splitting a big job. Sub-agents share state (store/workspace) but not history,
# never get `write_tool`, and their token cost folds into the parent's budget.
# max_depth caps nesting (1 = the top agent may delegate, sub-agents may not —
# prevents runaway fork bombs). ON by default; set enabled: false to opt out.
#
# NAMED subagents: drop a markdown file in workspace/agents/<name>.md (frontmatter
# `description:` + optional `tools: {allow: [...]}` / `{deny: [...]}` + optional
# `model:` (same provider, e.g. a cheaper model), body = its persona) and the
# agent delegates to it by name with `delegate_to(name, task)`.
# allow_authoring (default true) also lets the agent CREATE such files itself via
# `write_agent` — creating a new one is free (markdown, like write_skill), but
# UPDATING an existing subagent asks for approval (once/always/deny) so a
# relied-upon specialist isn't silently changed. Set allow_authoring: false for
# a fixed, human-curated roster.
#
# PARALLEL fan-out: `delegate_many(tasks)` / `delegate_to_many(name, tasks)` run
# independent subtasks concurrently and return one answer per task, in order.
# max_parallel caps how many run at once (default 4); a failed subtask returns an
# error in its slot without sinking its siblings.
subagents:
  enabled: true
  max_depth: 1
  allow_authoring: true
  max_parallel: 4

# ── Self-improvement (optional) ─────────────────────────────────────────────────
# Lets the agent extend itself, all sandboxed to workspace/. Shipped ON in this
# template (set enabled: false to opt out — the agent then can't author skills,
# tools, or lessons). When enabled it gains:
# write_skill/read_skill (markdown procedures, no approval), remember (lessons
# recalled next session), and write_tool/read_tool (Python tools that run ONLY
# after validation AND a human approval; "always allow" grants persist in
# workspace/approvals.json and re-prompt when the code changes).
self_improvement:
  enabled: true
# Recent lessons injected into the system prompt. Default: 5. (0 disables recall.)
# memory_recall: 5
# Generated-tool execution limits. timeout = wall-clock seconds a generated tool
# may run (default 10). banned_imports = modules rejected at validation.
# generated_tools:
#   timeout: 10
#   banned_imports: [subprocess, socket, ctypes, multiprocessing]
# Approvals. headless_allow_granted: on --serve (no human), honor previously
# persisted "always allow" grants instead of denying. Default: false (deny).
# approvals:
#   headless_allow_granted: false

# Semantic memory (optional). By default `remember` lessons are recalled by
# RECENCY (the last memory_recall). Turn this on and recall ranks lessons by
# RELEVANCE to the current task instead — `remember` stores an embedding next to
# each lesson, and recall does a cosine match. Lightweight (no vector DB); any
# embedding failure degrades to recency. Needs an embeddings-capable provider
# (OpenAI / OpenRouter / Ollama; Anthropic has no /embeddings → recency).
#   embed_model : the embeddings model (default text-embedding-3-small;
#                 Ollama → nomic-embed-text).
#   max_vectors : cap on stored lessons-with-embeddings (default 500).
# memory:
#   semantic: true
#   embed_model: text-embedding-3-small
#   max_vectors: 500

# ── MCP servers (optional) ──────────────────────────────────────────────────────
# Opt-in external tool servers. Install with `uv sync --extra mcp`, then declare
# them here; their tools appear like built-ins (prefixed with `name`). stdio
# servers are spawned locally; remote servers use `url`. See examples/mcp_demo/.
# Unset = no MCP, nothing changes.
# mcp:
#   - name: demo
#     command: python
#     args: ["examples/mcp_demo/echo_server.py"]
#   - name: docs
#     url: https://example.com/mcp
#     headers:
#       Authorization: "Bearer ..."

# ── Messaging gateways (optional) ───────────────────────────────────────────────
# Let people chat with this agent from Telegram / WhatsApp — "one brain, many
# channels". Built into the core (no extra to install); a channel stays DORMANT
# until you set enabled: true AND its token in .env. Each gateway runs as its own
# process; start/stop it from the menu ("Gateways") or with `agent --gateway
# telegram`. On a server, run `agent --serve` and Meta/Telegram webhooks mount at
# POST /webhook/<name>.
#
# Per-user memory: every platform user gets their OWN persistent thread
# (session "<gateway>:<user_id>"), so gateways need the concurrent SQLite store —
# set `store: agent.sqlite` above (a JSON store is unsafe when the CLI and a bot
# write at once).
#
# Access is DENY-ALL: an empty allowlist means nobody. Add ids in settings, via
# the menu, or (Telegram) let the owner run /allow <id> in chat. The owner id is
# always allowed and is the only one who can run /allow · /deny · /allowlist.
#   .env (secrets): TELEGRAM_BOT_TOKEN, TELEGRAM_OWNER_ID,
#                   WHATSAPP_TOKEN, WHATSAPP_PHONE_ID, WHATSAPP_VERIFY_TOKEN,
#                   WEBHOOK_SECRET (verifies inbound webhooks on --serve)
# gateways:
#   telegram:
#     enabled: true
#     # owner_id: 123456789        # always allowed; runs /allow, /deny, /allowlist
#     allowlist: []                # deny-all when empty; numeric Telegram ids
#     max_messages_per_day: 50     # per-user quota (0 = unlimited)
#     parse_mode: html             # html: render **bold**/lists/`code` (default) ·
#                                  # plain: strip markdown · markdownv2: pass-through
#     approvals: buttons           # buttons (inline Allow/Deny) | refuse (headless)
#   whatsapp:                       # webhook-only — needs `agent --serve` + public URL
#     enabled: true
#     allowlist: []                # deny-all when empty; sender phone numbers
#     max_messages_per_day: 50

# ── Your vertical's settings ────────────────────────────────────────────────────
# Add any keys your tools need; read them via ctx.deps.settings["..."]. Examples:
# symbols: [AAPL, MSFT, NVDA]
# thresholds:
#   max_position: 1000
# feeds:
#   - https://hnrss.org/frontpage
